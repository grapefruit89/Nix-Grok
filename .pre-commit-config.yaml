repos:
  - repo: local
    hooks:
      - id: statix
        name: statix (informational)
        language: system
        entry: bash -c 'statix check -c /etc/nixos/statix.toml; true'
        files: \.nix$
        exclude: ^stage-nixos/
        pass_filenames: false
      - id: deadnix
        name: deadnix
        language: system
        entry: deadnix --fail --no-lambda-arg modules/ machines/ lib/ users/ mcp/
        files: \.nix$
        exclude: ^stage-nixos/
        pass_filenames: false
      - id: alejandra
        name: alejandra
        language: system
        entry: alejandra --check
        files: \.nix$
        exclude: ^stage-nixos/
        pass_filenames: true
