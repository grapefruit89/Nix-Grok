repos:
  - repo: local
    hooks:
      - id: nixfmt
        name: nixfmt (RFC-Style)
        language: system
        entry: nixfmt --check
        files: \.nix$
        exclude: ^stage-nixos/
        pass_filenames: true

      - id: statix
        name: statix (informational — repeated_keys ist NixOS-Modul-Pattern)
        language: system
        entry: bash -c 'statix check -c /etc/nixos/statix.toml; true'
        files: \.nix$
        exclude: ^stage-nixos/
        pass_filenames: false

      - id: deadnix
        name: deadnix
        language: system
        entry: deadnix --fail --no-lambda-arg modules/ machines/ lib/ users/ mcp/
        files: \.nix$
        exclude: ^stage-nixos/
        pass_filenames: false
